<!DOCTYPE html>
<html lang="es">
  <head>
    <title>Contacto</title>
    <meta name="description" content="Home de mi espacio personal: Ignacio Navarro"/>
    <link rel="stylesheet" href="./css/contacto.css">
  </head>
  <body data-page="contacto">

    <!-- Aquí irá el HEADER, que se cargará en main.js mediante módulos-->

    <main>
      <section>
        <h1>Contacta conmigo</h1>
        <p>Rellena los siguientes datos y mándame tu consulta.</p>

        <form>
          <!-- Datos Personales -->
          <fieldset>
            <legend>Información Personal</legend>

            <label for="nombre_completo" class="required">Nombre Completo:</label>
            <input
              type="text"
              id="nombre_completo"
              name="nombre_completo"
              placeholder="Escribe tu nombre"
              required
            />

            <label for="email" class="required">Email:</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="tunombre@correo.com"
              required
            />
          </fieldset>

          <!-- Consulta -->
          <fieldset>
            <legend>Realiza tu consulta</legend>

            <label for="asunto" class="required">Asunto:</label>
            <input
              type="text"
              id="asunto"
              name="asunto"
              placeholder="Asunto"
              required
            />

            <label for="message" class="required">Mensaje:</label>
            <textarea
              id="message"
              name="message"
              rows="5"
              cols="40"
              placeholder="Escribe aquí..."
              required
            ></textarea>
          </fieldset>

          <!-- Botones -->
          <p>
            <button type="submit">Enviar</button>
            <button type="reset">Borrar</button>
          </p>
        </form>
      </section>
    </main>

    <!-- Aquí irá el FOOTER, que se cargará en main.js mediante módulos-->

  <script type="module" src="./js/main.js"></script>
  </body>
</html>
